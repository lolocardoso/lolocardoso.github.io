<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1>Filminho comigo</h1>
    <div class="details">
      <p class="date-time">Data: 09 de Junho - Sexta feira</p>
      <p class="date-time">Horário: Podemos marcar</p>
      <p class="location">Local: Ligação do Zap ou Discord</p>
      <p class="location">Filme que iremos assistir:</p>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSbv91r42zRaMK3JNwESrmevfVD481XjTzfroBR2a2crNA4cO1e" alt="" class="movie-image">
    </div>
    <h6>Confirme sua presença:</h6>
    <div class="button-container d-flex justify-content-center">
      <a class="btn btn-primary me-2" id="sim" href="#">Aceitar</a>
      <a class="btn btn-danger" id="nao" href="#">Negar</a>
    </div>
  </div>

  <script>
    var sim = document.getElementById("sim");
    var nao = document.getElementById("nao");

    sim.addEventListener("click", function() {
      alert("Você selecionou SIM!");
    });

    nao.addEventListener("mouseover", function() {
      var larguraJanela = window.innerWidth;
      var alturaJanela = window.innerHeight;

      var novaPosicaoEsquerda = Math.random() * (larguraJanela - nao.offsetWidth);
      var novaPosicaoTopo = Math.random() * (alturaJanela - nao.offsetHeight);

      nao.style.left = novaPosicaoEsquerda + "px";
      nao.style.top = novaPosicaoTopo + "px";
    });
  </script>
</body>
</html>
