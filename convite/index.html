<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #e71d36;
    }

    form {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 10px;
    }

    input {
      padding: 8px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      background-color: #e71d36;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #b50026;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <form>
      <label for="username">Username:</label>
      <input type="text" id="username" required>
      <label for="password">Password:</label>
      <input type="password" id="password" required>
      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    var form = document.querySelector('form');
    form.addEventListener('submit', function(event) {
      event.preventDefault(); // Impede o envio padrão do formulário

      // Verifique as credenciais do usuário
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;

      // Aqui você pode fazer a validação das credenciais
      // e decidir se o login foi bem-sucedido ou não

      // Exemplo básico: verificando se o username é "admin" e a senha é "123456"
      if (username === 'luiza' && password === 'gatinha') {
        // Redireciona para a página secreta
        window.location.href = 'pagina_secreta.html';
      } else {
        alert('Credenciais inválidas. Por favor, tente novamente.');
      }
    });
  </script>
</body>
</html>
